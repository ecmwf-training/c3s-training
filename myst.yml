version: 1
project:
  title: Copernicus Climate Change Service (C3S) Training Book
  exclude:
    - '**.ipynb_checkpoints'
    - '**README.md'
  github: ecmwf-training/C3S-training
  thebe:
    binder:
      repo: ecmwf-training/C3S-training
      provider: github
      url: https://mybinder.org
      ref: develop
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - file: how-to-run-these-tutorials.md
    - title: Tutorials
      children:
        - title: Reanalysis
          children:
            - file: >-
                submodules/c3s-training-submodule-reanalysis/reanalysis-climatology.ipynb
              title: Climatology
            - file: >-
                submodules/c3s-training-submodule-reanalysis/reanalysis-heatwave.ipynb
              title: Heatwave Analysis
            - file: >-
                submodules/c3s-training-submodule-reanalysis/reanalysis-temp-record.ipynb
              title: Temperature Record
        - title: Climate Projections
          children:
            - file: >-
                submodules/c3s-training-submodule-projections/projections-cmip6.ipynb
              title: Global Climate Projections (CMIP6)
            - file: >-
                submodules/c3s-training-submodule-projections/projections-cordex.ipynb
              title: Regional Climate Projections (CORDEX)
        - title: Seasonal Forecasts
          children:
            - file: >-
                submodules/c3s-training-submodule-seasonal-forecast/sf-anomalies.ipynb
              title: Seasonal Forecast Anomalies
            - file: >-
                submodules/c3s-training-submodule-seasonal-forecast/sf-verification.ipynb
              title: Seasonal Forecast Verification
        - title: Climate Indices
          children:
            - file: >-
                submodules/c3s-training-submodule-climate-indices/ci-windchill.ipynb
              title: Windchill
            - file: >-
                submodules/c3s-training-submodule-climate-indices/warm-and-wet-days-indicator.ipynb
              title: Warm and wet days indicator
            - file: >-
                submodules/c3s-training-submodule-climate-indices/gtsmip-water-levels.ipynb
              title: Coastal water levels and storm surges
        - title: Satellite observations
          children:
            - title: Atmospheric physics
              children:
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/erb-outgoing-longwave-radiation.ipynb
                  title: Outgoing Longwave Radiation
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/erb-clara-climatology.ipynb
                  title: Analysis of the CLARA Earth radiation budget product
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/erb-ceres-climatology.ipynb
                  title: Analysis of the CERES Earth radiation budget product
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/total-solar-irradiance.ipynb
                  title: Total Solar Irradiance
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/srb-climatology-and-anomaly.ipynb
                  title: Surface radiation budget climatologies and anomalies
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/total-column-water-vapour-combi.ipynb
                  title: Total column water vapour
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/tropospheric-humidity-from-radio-occultation.ipynb
                  title: >-
                    Tropospheric humidity estimates from satellite-based radio
                    occultation measurements
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/cloud-cover-climatology.ipynb
                  title: Cloud fractional cover climatology
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-physics/precipitation-girafe.ipynb
                  title: Exploring Precipitation information in the GIRAFE dataset
            - title: Atmospheric composition
              children:
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-comp/greenhouse-gases-level2-products.ipynb
                  title: Greenhouse Gas Level 2 Products
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-comp/greenhouse-gases-level3-products.ipynb
                  title: Greenhouse Gas Level 3 Products
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-comp/aerosol-single-sensor-demonstrator.ipynb
                  title: Aerosol Single Sensor Demonstrator
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-comp/aerosol-multi-sensor-record.ipynb
                  title: Aerosol Multi-Sensor Record
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-atmos-comp/total-ozone-columns.ipynb
                  title: Total Ozone Columns
            - title: Hydrology and cryosphere
              children:
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/soil-moisture-anomalies.ipynb
                  title: Soil Moisture Anomaly Analysis
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/lake-water-level.ipynb
                  title: Lake Water Level Timeseries
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/lake-surface-water-temperature.ipynb
                  title: Lake Surface Water Temperature Analysis
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/ice-sheet-velocity.ipynb
                  title: Ice Sheet Velocity
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/ice-sheet-mass-balance.ipynb
                  title: Ice Sheet Mass Balance
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-hydro-cryo/glacier-mass-change.ipynb
                  title: Glacier Mass Change
            - title: Ocean
              children:
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-ocean/viewer-for-sealevel-product.ipynb
                  title: Sea level and surface currents
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-ocean/ocean-colour-sea-surface-temperature.ipynb
                  title: Ocean colour and sea surface temperature
            - title: Land
              children:
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/convert-effective-lai-to-lai.ipynb
                  title: Convert effective LAI to LAI
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/lai-fapar-mean-with-inverse-variance-weights.ipynb
                  title: Time average of LAI and fAPAR using inverse variance weights
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/exploring-surface-albedo.ipynb
                  title: Explore surface albedo
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/land-cover.ipynb
                  title: Explore global land cover
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/fire-burned-area.ipynb 
                  title: Explore fire burned area
                - file: >-
                    submodules/c3s-training-submodule-sat-obs-land/fire-radiative-power-and-active-fire.ipynb
                  title: Explore active fire and fire radiative power
    - title: Other learning resources
      children:
        - url: https://ecmwf-projects.github.io/c3s2-eqc-quality-assessment/intro.html
          title: Quality assessments of C3S data
        - url: https://ecmwf-training.github.io/cams-training/intro.html
          title: CAMS data tutorials
        - url: https://ibicus.readthedocs.io/en/latest/getting_started/overview.html
          title: Ibicus and bias correction
    - url: https://climate.copernicus.eu/help-and-support
      title: Help & Support
site:
  template: book-theme
  options:
    folders: true
    style: ./_static/custom.css
    logo: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_c3s.png
    logo_dark: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_c3s_neg.png
    logo_url: https://climate.copernicus.eu
